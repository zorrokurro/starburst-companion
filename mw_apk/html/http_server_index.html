<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <title>MW手册 - For PC Web</title>
    <link href="http://at.alicdn.com/t/font_1551254_rxrrzgz2kjc.css" rel="stylesheet"
          type="text/css"/><!--地址不定时更新，引用时请注意-->
    <link href="https://src.axui.cn/v2.0/dist/css/ax.css" rel="stylesheet" type="text/css">
    <link href="https://src.axui.cn/v2.0/dist/css/ax-response.css" rel="stylesheet" type="text/css">
</head>
<body class="ax-article" style="margin:48px;width:80%">

<h1>MW手册 - For PC Web</h1>

<h3>MW手册提供数据支持，若无数据，请更新手册数据</h3>


<h2>测试</h2>
<input type="text" id="name">
<button onclick="test()" class="ax-btn">搜精灵</button>
<button onclick="test1()" class="ax-btn">搜技能</button>
<button onclick="test2()" class="ax-btn">搜刻印</button>
<p id="result"></p>


<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.js"
        type="text/javascript"></script>
<script src="https://axui.cn/v2.0/dist/js/ax.js" type="text/javascript"></script>
<script>

function test(){
$.ajax({
url: "getMonster", //要请求的后端地址
type: "POST", //数据发送的方式(POST或者GET)
data: {name: $("#name").val()}, //需要传递的参数
dataType: "json", //后端返回的数据格式
success: function (result) {//ajax请求成功后触发的方法
$("#result").html(JSON.stringify(result)) //result为响应内容
},
error: function () {//ajax请求失败后触发的方法
$("#result").html("error")
}
});
}
function test1(){
$.ajax({
url: "getMove", //要请求的后端地址
type: "POST", //数据发送的方式(POST或者GET)
data: {name: $("#name").val()}, //需要传递的参数
dataType: "json", //后端返回的数据格式
success: function (result) {//ajax请求成功后触发的方法
$("#result").html(JSON.stringify(result)) //result为响应内容
},
error: function () {//ajax请求失败后触发的方法
$("#result").html("error")
}
});
}
function test2(){
$.ajax({
url: "getMintmark", //要请求的后端地址
type: "POST", //数据发送的方式(POST或者GET)
data: {name: $("#name").val()}, //需要传递的参数
dataType: "json", //后端返回的数据格式
success: function (result) {//ajax请求成功后触发的方法
$("#result").html(JSON.stringify(result)) //result为响应内容
},
error: function () {//ajax请求失败后触发的方法
$("#result").html("error")
}
});
}


</script>
</body>
